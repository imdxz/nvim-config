set -g mouse on
setw -g mode-keys vi

set -s set-clipboard on

set -g status-interval 5
set -g status-left "[#S] "
set -g status-right "#{?pane_in_mode,#[bg=yellow]#[fg=black] VI-MODE #[default],}"
set -ag status-right "#(hostname -s) | "
set -ag status-right "%b %d %a | %I:%M %p"
set -g status-style "bg=black,fg=white"
set -g window-status-current-style "fg=black,bg=white,bold"

set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=green bold] ACTIVE #{pane_index} #[default], #{pane_index} }'
set -g pane-active-border-style 'fg=green bold'
set -g pane-border-style 'fg=white'

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

