set -g mouse on
setw -g mode-keys vi

# set -g window-status-format " #T | #I "
# set -g window-status-current-format " #T | #I "

set -g status-interval 5
set -g status-left "[#S] "
set -g status-right "#{?pane_in_mode,#[bg=yellow]#[fg=black] VI-MODE #[default],}"
set -ag status-right "#(hostname -s) | "
set -ag status-right "%b %d %a | %I:%M %p"
set -g status-style "bg=black,fg=white"
set -g window-status-current-style "fg=black,bg=white,bold"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

